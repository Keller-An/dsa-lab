<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление валютами</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .block { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, button { margin: 5px; padding: 8px; }
        button { background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<h1>Управление валютами</h1>

<div class="block">
    <h2>1. Добавить валюту</h2>
    <input type="text" id="name1" placeholder="Название (USD, EUR)">
    <input type="text" id="rate1" placeholder="Курс к рублю">
    <button onclick="addCurrency()">Добавить</button>
    <pre id="result1"></pre>
</div>

<div class="block">
    <h2>2. Обновить курс валюты</h2>
    <input type="text" id="name2" placeholder="Название валюты">
    <input type="text" id="rate2" placeholder="Новый курс">
    <button onclick="updateCurrency()">Обновить</button>
    <pre id="result2"></pre>
</div>

<div class="block">
    <h2>3. Удалить валюту</h2>
    <input type="text" id="name3" placeholder="Название валюты">
    <button onclick="deleteCurrency()">Удалить</button>
    <pre id="result3"></pre>
</div>

<div class="block">
    <h2>4. Конвертация в рубли</h2>
    <input type="text" id="name4" placeholder="Название валюты (USD)">
    <input type="text" id="amount" placeholder="Сумма в валюте">
    <button onclick="convertCurrency()">Конвертировать</button>
    <pre id="result4"></pre>
</div>

<div class="block">
    <h2>5. Все валюты</h2>
    <button onclick="showAll()">Показать все валюты</button>
    <pre id="result5"></pre>
</div>

<script>
    async function addCurrency() {
        let name = document.getElementById('name1').value;
        let rate = document.getElementById('rate1').value;
        
        let response = await fetch('/api/load', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({currency_name: name, rate: rate})
        });
        
        let result = await response.json();
        document.getElementById('result1').innerHTML = JSON.stringify(result, null, 2);
    }
    
    async function updateCurrency() {
        let name = document.getElementById('name2').value;
        let rate = document.getElementById('rate2').value;
        
        let response = await fetch('/api/update_currency', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({currency_name: name, rate: rate})
        });
        
        let result = await response.json();
        document.getElementById('result2').innerHTML = JSON.stringify(result, null, 2);
    }
    
    async function deleteCurrency() {
        let name = document.getElementById('name3').value;
        
        let response = await fetch('/api/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({currency_name: name})
        });
        
        let result = await response.json();
        document.getElementById('result3').innerHTML = JSON.stringify(result, null, 2);
    }
    
    async function convertCurrency() {
        let name = document.getElementById('name4').value;
        let amount = document.getElementById('amount').value;
        
        let response = await fetch(`/api/convert?currency_name=${name}&amount=${amount}`);
        let result = await response.json();
        document.getElementById('result4').innerHTML = JSON.stringify(result, null, 2);
    }
    
    async function showAll() {
        let response = await fetch('/api/currencies');
        let result = await response.json();
        document.getElementById('result5').innerHTML = JSON.stringify(result, null, 2);
    }
</script>

</body>
</html>
